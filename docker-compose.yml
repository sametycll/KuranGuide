version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=KuranGuideDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true;
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=KuranGuideApi
      - Jwt__Audience=KuranGuideApiUsers
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kuranguide-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.Web
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ApiBaseUrl=http://api:8080/
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - kuranguide-net

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - kuranguide-net

volumes:
  sqlserver-data:


networks:
  kuranguide-net:
    driver: bridge
